<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorkRest Mini</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- 主页面 -->
    <div id="main-page" class="page active">
      <div class="background-gradient"></div>
      <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
      </div>
      
      <!-- v2.0.1: 标题栏 -->
      <div class="title-bar">
        <div class="title-bar-left">
          <!-- v2.0.1: 办公室模式按钮 -->
          <button id="btn-office-mode" class="btn-office-mode" title="办公室模式（静音）">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            </svg>
            <span>静音</span>
          </button>
        </div>
        <div class="title-bar-center">
          <span class="app-title">WorkRest Mini</span>
        </div>
        <div class="title-bar-right">
          <!-- v2.0.1: 窗口控制按钮 -->
          <button id="btn-minimize" class="btn-window-control" title="最小化">
            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>
          <button id="btn-close" class="btn-window-control btn-close" title="关闭">
            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
      </div>
      
      <div class="content">
        <div class="header">
          <div class="logo">
            <svg viewBox="0 0 64 64" class="clock-icon">
              <circle cx="32" cy="32" r="28" fill="none" stroke="currentColor" stroke-width="3"/>
              <line x1="32" y1="32" x2="32" y2="14" stroke="currentColor" stroke-width="3" stroke-linecap="round" class="hour-hand"/>
              <line x1="32" y1="32" x2="46" y2="32" stroke="currentColor" stroke-width="3" stroke-linecap="round" class="minute-hand"/>
            </svg>
            <span class="app-name">WorkRest</span>
          </div>
        </div>
        
        <div class="main-area">
          <div class="status-badge" id="status-badge">
            <span class="status-dot"></span>
            <span class="status-text">准备开始</span>
          </div>
          
          <div class="timer-display">
            <div class="timer-circle">
              <svg viewBox="0 0 200 200" class="progress-ring">
                <defs>
                  <linearGradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#E8F0FF"/>
                    <stop offset="100%" style="stop-color:#BBD8FF"/>
                  </linearGradient>
                </defs>
                <circle class="progress-ring-bg" cx="100" cy="100" r="90"/>
                <circle class="progress-ring-fill" cx="100" cy="100" r="90" 
                        stroke="url(#progressGradient)" 
                        stroke-dasharray="565.48" 
                        stroke-dashoffset="0"/>
              </svg>
              <div class="timer-text">
                <span id="timer-value">00:00</span>
              </div>
            </div>
          </div>
          
          <div class="action-area">
            <button id="btn-toggle" class="btn btn-primary btn-large">
              <svg id="toggle-icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
              </svg>
              <span id="toggle-text">开始工作</span>
            </button>
            
            <button id="btn-stop" class="btn btn-secondary" disabled>
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="6" y="6" width="12" height="12" rx="2"></rect>
              </svg>
              停止
            </button>
          </div>
          
          <div class="secondary-actions">
            <button id="btn-visualize" class="btn btn-text">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 3v18h18"></path>
                <path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"></path>
              </svg>
              查看统计
            </button>
            <button id="btn-settings" class="btn btn-text">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
              </svg>
              配置调整
            </button>
          </div>
        </div>
        
        <div class="footer-stats">
          <div class="stat-item">
            <span class="stat-label">今日工作</span>
            <span class="stat-value" id="quick-total">0分钟</span>
          </div>
        </div>
      </div>
    </div>
    
    <!-- 统计页面 - v2.0.1 -->
    <div id="visualize-page" class="page">
      <div class="background-gradient"></div>
      
      <div class="content">
        <div class="stats-header">
          <button id="btn-back-from-stats" class="btn btn-icon">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 12H5M12 19l-7-7 7-7"></path>
            </svg>
          </button>
          <span class="page-title">今日统计</span>
          <button id="btn-quit-from-stats" class="btn btn-icon btn-quit-icon">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
          </button>
        </div>
        
        <div class="stats-body">
          <div class="total-card">
            <div class="total-label">今日总工作时长</div>
            <div class="total-value" id="total-display">0分钟</div>
          </div>
          
          <div class="timeline-card">
            <div class="timeline-title">时间段分布</div>
            <div class="timeline-bar-container">
              <div class="timeline-bar">
                <div class="t-segment morning-seg" id="bar-morning"></div>
                <div class="t-segment afternoon-seg" id="bar-afternoon"></div>
                <div class="t-segment evening-seg" id="bar-evening"></div>
              </div>
              <!-- v2.0.1: 目标线 -->
              <div class="goal-lines-mini">
                <div class="goal-line-mini morning-line" style="left: 37.5%"></div>
                <div class="goal-line-mini afternoon-line" style="left: 87.5%"></div>
              </div>
              <div class="timeline-labels">
                <span class="t-label"><span class="dot morning-dot"></span>早上 09-12点</span>
                <span class="t-label"><span class="dot afternoon-dot"></span>下午 12-18点</span>
                <span class="t-label"><span class="dot evening-dot"></span>晚上 18-23点</span>
              </div>
            </div>
          </div>
          
          <div class="detail-cards">
            <div class="detail-card stat-item-mini">
              <div class="detail-header">
                <span class="detail-name">早上</span>
                <span class="detail-target">目标 3小时</span>
              </div>
              <div class="detail-value" id="detail-morning">0分钟</div>
            </div>
            <div class="detail-card stat-item-mini">
              <div class="detail-header">
                <span class="detail-name">下午</span>
                <span class="detail-target">目标 4小时</span>
              </div>
              <div class="detail-value" id="detail-afternoon">0分钟</div>
            </div>
            <div class="detail-card stat-item-mini">
              <div class="detail-header">
                <span class="detail-name">晚上</span>
                <span class="detail-target">目标 3小时</span>
              </div>
              <div class="detail-value" id="detail-evening">0分钟</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- 设置页面 -->
    <div id="settings-page" class="page">
      <div class="background-gradient"></div>
      
      <div class="content">
        <div class="stats-header">
          <button id="btn-back-from-settings" class="btn btn-icon">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 12H5M12 19l-7-7 7-7"></path>
            </svg>
          </button>
          <span class="page-title">配置调整</span>
          <div class="spacer"></div>
        </div>
        
        <div class="settings-body">
          <div class="settings-intro">
            调整应用配置，包括工作/休息时长、音乐目录和语音包
          </div>
          
          <div class="setting-item">
            <div class="setting-header">
              <div class="setting-icon work-icon">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                  <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
                </svg>
              </div>
              <div class="setting-info">
                <div class="setting-name">工作时长</div>
                <div class="setting-desc">专注工作的时间</div>
              </div>
            </div>
            <div class="setting-control">
              <button class="btn-adjust" id="btn-work-minus">−</button>
              <div class="setting-value">
                <span id="work-value">45</span>
                <span class="unit">分钟</span>
              </div>
              <button class="btn-adjust" id="btn-work-plus">+</button>
            </div>
            <input type="range" id="work-slider" min="5" max="120" value="45" step="5">
          </div>
          
          <div class="setting-item">
            <div class="setting-header">
              <div class="setting-icon break-icon">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
                </svg>
              </div>
              <div class="setting-info">
                <div class="setting-name">休息时长</div>
                <div class="setting-desc">放松休息的时间</div>
              </div>
            </div>
            <div class="setting-control">
              <button class="btn-adjust" id="btn-break-minus">−</button>
              <div class="setting-value">
                <span id="break-value">15</span>
                <span class="unit">分钟</span>
              </div>
              <button class="btn-adjust" id="btn-break-plus">+</button>
            </div>
            <input type="range" id="break-slider" min="1" max="60" value="15" step="1">
          </div>
          
          <div class="setting-item">
            <div class="setting-header">
              <div class="setting-icon music-icon">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M9 18V5l12-2v13"></path>
                  <circle cx="6" cy="18" r="3"></circle>
                  <circle cx="18" cy="16" r="3"></circle>
                </svg>
              </div>
              <div class="setting-info">
                <div class="setting-name">音乐目录</div>
                <div class="setting-desc">休息音乐的文件夹路径</div>
              </div>
            </div>
            <div class="setting-path" id="music-dir-display">/home/steven/音乐/Music</div>
            <button class="btn btn-secondary btn-select" id="btn-select-music-dir">选择目录</button>
          </div>
          
          <div class="setting-item">
            <div class="setting-header">
              <div class="setting-icon voice-icon">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                  <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                  <line x1="12" y1="19" x2="12" y2="23"></line>
                  <line x1="8" y1="23" x2="16" y2="23"></line>
                </svg>
              </div>
              <div class="setting-info">
                <div class="setting-name">语音播报</div>
                <div class="setting-desc">选择喜欢的语音包</div>
              </div>
            </div>
            <div class="setting-select">
              <select id="voice-pack-select">
                <option value="edge-tts-xiaoxiao">Edge TTS - 晓晓中文 (推荐)</option>
                <option value="google-tts-en">Google TTS - 英文女声</option>
                <option value="espeak-zh">eSpeak - 中文语音 (离线)</option>
              </select>
            </div>
            <button class="btn btn-text" id="btn-test-voice">测试语音</button>
          </div>
          
          <div class="settings-actions">
            <button id="btn-reset-settings" class="btn btn-secondary">
              恢复默认
            </button>
            <button id="btn-save-settings" class="btn btn-primary">
              保存设置
            </button>
          </div>
        </div>
      </div>
    </div>
    
    <!-- 对话框 -->
    <div id="dialog-overlay" class="dialog-overlay">
      <div class="dialog">
        <div class="dialog-header">
          <h3 id="dialog-title">标题</h3>
        </div>
        <div class="dialog-body">
          <p id="dialog-message">消息内容</p>
        </div>
        <div class="dialog-footer">
          <button id="dialog-btn-0" class="btn btn-primary"></button>
          <button id="dialog-btn-1" class="btn btn-secondary"></button>
        </div>
      </div>
    </div>
  </div>
  
  <script src="assets/anime.min.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
